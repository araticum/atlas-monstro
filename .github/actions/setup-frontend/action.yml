name: Setup Frontend
description: |
  Common setup for frontend jobs using pnpm
  Skips heavy binary installs that are needed for e2e by default
inputs:
  install-e2e-binaries:
    description: 'Install heavy e2e binary downloads'
    required: false
    default: 'false'
runs:
  using: "composite"
  steps:
    - if: inputs.install-e2e-binaries == 'false'
      shell: bash
      run: |
        echo "CYPRESS_INSTALL_BINARY=0"             >> $GITHUB_ENV
        echo "PUPPETEER_SKIP_DOWNLOAD=true"         >> $GITHUB_ENV
        echo "PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1"   >> $GITHUB_ENV
    - name: Set isolated frontend tool/cache dirs
      shell: bash
      run: |
        KEY="${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-0}-${GITHUB_JOB:-job}-$$"
        PNPM_DIR="${RUNNER_TEMP}/pnpm-${KEY}"
        NPM_CACHE_DIR="${RUNNER_TEMP}/npm-cache-${KEY}"
        XDG_CACHE_DIR="${RUNNER_TEMP}/xdg-cache-${KEY}"
        mkdir -p "$PNPM_DIR" "$NPM_CACHE_DIR" "$XDG_CACHE_DIR"
        echo "PNPM_HOME=${PNPM_DIR}" >> $GITHUB_ENV
        echo "npm_config_cache=${NPM_CACHE_DIR}" >> $GITHUB_ENV
        echo "XDG_CACHE_HOME=${XDG_CACHE_DIR}" >> $GITHUB_ENV
    - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      with:
        run_install: false
        package_json_file: frontend/package.json
    - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
      with:
        node-version-file: frontend/.nvmrc
        cache: 'pnpm'
        cache-dependency-path: frontend/pnpm-lock.yaml
    - name: Install dependencies
      working-directory: frontend
      run: pnpm install --frozen-lockfile --prefer-offline
      shell: bash
